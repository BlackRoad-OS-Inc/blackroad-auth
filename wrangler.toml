name = "auth-blackroad"
main = "src/worker.js"
compatibility_date = "2024-12-01"
workers_dev = true

routes = [
  { pattern = "auth.blackroad.io/*", zone_name = "blackroad.io" }
]

[[d1_databases]]
binding = "DB"
database_name = "blackroad-auth"
database_id = "761ccc7a-f2b5-43d5-b0df-aeedc212d382"

[vars]
JWT_ISSUER = "blackroad.io"
ALLOWED_ORIGINS = "https://blackroad.io,https://www.blackroad.io,https://portal.blackroad.io,https://chat.blackroad.io,http://localhost:5173"
